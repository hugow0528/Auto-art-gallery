<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>書籍閱讀器 — 自動藝術圖庫</title>
  <meta name="description" content="閱讀由 AI 插圖配搭的中文文學回憶錄，每次一段文字。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & variables ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f0e8;
      --surface:   #fffdf7;
      --border:    #e0d8c8;
      --text:      #2c2416;
      --text-muted:#7a6a52;
      --accent:    #8b5e3c;
      --accent-2:  #c89b6e;
      --progress:  #8b5e3c;
      --shadow:    rgba(44,36,22,.10);
      --radius:    12px;
    }

    [data-theme="dark"] {
      --bg:        #1a1610;
      --surface:   #231f18;
      --border:    #3a3228;
      --text:      #e8dcc8;
      --text-muted:#8a7a62;
      --accent:    #c89b6e;
      --accent-2:  #8b5e3c;
      --progress:  #c89b6e;
      --shadow:    rgba(0,0,0,.30);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .3s, color .3s;
    }

    /* ── Top bar ────────────────────────────────────────────────── */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 12px var(--shadow);
      padding: 0 clamp(1rem, 4vw, 3rem);
    }

    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      height: 60px;
    }

    .site-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .site-title a {
      color: inherit;
      text-decoration: none;
    }

    .divider { color: var(--border); font-size: 1.2rem; }

    .page-title {
      font-size: 1.0rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* progress bar */
    .progress-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: .7rem;
      min-width: 0;
    }

    .progress-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--progress);
      border-radius: 99px;
      transition: width .6s ease;
    }

    .progress-text {
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* theme toggle */
    #theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: .3rem .7rem;
      font-size: .8rem;
      cursor: pointer;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      transition: border-color .2s, color .2s;
    }
    #theme-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Hero ───────────────────────────────────────────────────── */
    #hero {
      max-width: 720px;
      margin: 3rem auto 0;
      padding: 0 clamp(1rem, 4vw, 2rem);
      text-align: center;
    }

    #hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      color: var(--accent);
      line-height: 1.3;
    }

    #hero p {
      margin-top: .8rem;
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .completed-badge {
      display: inline-block;
      margin-top: 1rem;
      padding: .4rem 1.2rem;
      background: var(--accent);
      color: #fff;
      border-radius: 99px;
      font-size: .85rem;
      font-family: 'Inter', sans-serif;
    }

    /* ── Entry feed ─────────────────────────────────────────────── */
    #feed {
      max-width: 1100px;
      margin: 3rem auto 4rem;
      padding: 0 clamp(1rem, 4vw, 2rem);
      display: flex;
      flex-direction: column;
      gap: 4rem;
    }

    /* individual entry */
    .entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 380px;
    }

    /* alternate image left / right */
    .entry:nth-child(even) .entry-image { order: -1; }

    .entry-text {
      padding: clamp(1.5rem, 4vw, 2.5rem);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .entry-meta {
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-wrap: wrap;
    }

    .entry-num {
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      padding: .2rem .7rem;
      border-radius: 99px;
    }

    .entry-date {
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      color: var(--text-muted);
    }

    .entry-passage {
      font-size: clamp(.95rem, 1.8vw, 1.1rem);
      line-height: 2;
      color: var(--text);
      flex: 1;
    }

    .entry-caption {
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: .8rem;
      line-height: 1.5;
    }

    .entry-play-from-btn {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      margin-top: .6rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: .25rem .75rem .25rem .5rem;
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
    }
    .entry-play-from-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .entry-play-from-btn:hover { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }

    .entry-image {
      position: relative;
      overflow: hidden;
      background: var(--border);
      min-height: 300px;
    }

    .entry-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }

    .entry:hover .entry-image img { transform: scale(1.03); }

    /* lightbox overlay on image click */
    .entry-image img { cursor: zoom-in; }

    /* ── Loading / empty states ─────────────────────────────────── */
    #status {
      max-width: 480px;
      margin: 5rem auto;
      text-align: center;
      font-family: 'Inter', sans-serif;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Lightbox ───────────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,.85);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }

    /* ── Auto-play button ───────────────────────────────────────── */
    #autoplay-btn {
      background: var(--accent);
      border: none;
      border-radius: 99px;
      padding: .3rem .9rem;
      font-size: .8rem;
      cursor: pointer;
      color: var(--surface);
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      transition: background .2s, opacity .2s;
      flex-shrink: 0;
    }
    #autoplay-btn:hover { background: var(--accent-2); }
    #autoplay-btn:disabled { opacity: .45; cursor: default; }

    /* ── Auto-play overlay ──────────────────────────────────────── */
    #autoplay-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--bg);
      flex-direction: column;
    }
    #autoplay-overlay.open { display: flex; }

    #autoplay-top-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .55rem 1.2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
      flex-shrink: 0;
    }
    #autoplay-close-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: .3rem .8rem;
      font-size: .8rem;
      cursor: pointer;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      transition: border-color .2s, color .2s;
      flex-shrink: 0;
    }
    #autoplay-close-btn:hover { border-color: var(--accent); color: var(--accent); }

    #autoplay-progress-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: .7rem;
      min-width: 0;
    }
    #autoplay-progress-bg {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    #autoplay-progress-fill {
      height: 100%;
      background: var(--progress);
      border-radius: 99px;
      transition: width .6s ease;
    }
    #autoplay-counter {
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #autoplay-content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      min-height: 0;
    }
    #autoplay-image-panel {
      position: relative;
      overflow: hidden;
      background: var(--border);
    }
    #autoplay-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity .5s ease;
    }
    #autoplay-countdown-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      background: var(--accent);
      width: 100%;
      border-radius: 0 2px 2px 0;
    }

    #autoplay-text-panel {
      display: flex;
      flex-direction: column;
      padding: clamp(1.2rem, 3vw, 2.5rem);
      overflow-y: auto;
      gap: 1rem;
      min-height: 0;
    }
    #autoplay-meta {
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    #autoplay-entry-num {
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      padding: .2rem .7rem;
      border-radius: 99px;
    }
    #autoplay-entry-date {
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      color: var(--text-muted);
    }
    #autoplay-pause-badge {
      font-family: 'Inter', sans-serif;
      font-size: .72rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: .15rem .55rem;
      border-radius: 99px;
      display: none;
    }
    #autoplay-pause-badge.visible { display: inline-block; }

    #autoplay-passage {
      font-size: clamp(.95rem, 1.6vw, 1.1rem);
      line-height: 2;
      color: var(--text);
      flex: 1;
      transition: opacity .35s ease;
      min-height: 0;
      overflow-y: auto;
    }
    #autoplay-caption {
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: .8rem;
      line-height: 1.5;
      flex-shrink: 0;
    }

    #autoplay-timer-row {
      display: flex;
      align-items: center;
      gap: .55rem;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .autoplay-adj-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.1rem;
      line-height: 1;
      padding: 0;
      transition: border-color .2s, color .2s;
      flex-shrink: 0;
    }
    .autoplay-adj-btn:hover { border-color: var(--accent); color: var(--accent); }
    #autoplay-timer-value {
      font-weight: 600;
      color: var(--text);
      min-width: 1.5rem;
      text-align: center;
    }

    #autoplay-nav {
      display: flex;
      align-items: center;
      gap: .8rem;
      justify-content: center;
      flex-shrink: 0;
    }
    .autoplay-nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      transition: all .2s;
      flex-shrink: 0;
    }
    .autoplay-nav-btn:hover { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .autoplay-nav-btn:disabled { opacity: .35; cursor: default; pointer-events: none; }
    .autoplay-nav-btn svg {
      width: 20px;
      height: 20px;
      display: block;
      flex-shrink: 0;
    }
    #autoplay-playpause {
      width: 50px;
      height: 50px;
      background: var(--accent);
      border-color: var(--accent);
      color: var(--surface);
    }
    #autoplay-playpause svg { width: 22px; height: 22px; }
    #autoplay-playpause:hover { background: var(--accent-2); border-color: var(--accent-2); color: var(--surface); }
    #autoplay-tts.active { background: var(--accent); border-color: var(--accent); color: var(--surface); }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .entry {
        grid-template-columns: 1fr;
      }

      .entry:nth-child(even) .entry-image { order: unset; }

      .entry-image { min-height: 220px; }

      .progress-wrap { display: none; }

      .page-title { display: none; }

      #autoplay-content {
        grid-template-columns: 1fr;
        grid-template-rows: 45vw 1fr;
        overflow: hidden;
      }
      #autoplay-image-panel { height: 45vw; }
      #autoplay-text-panel { overflow-y: auto; }
      #autoplay-progress-wrap { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Top navigation bar ──────────────────────────────────────── -->
<nav id="topbar">
  <div class="topbar-inner">
    <span class="site-title"><a href="../index.html">🎨 Auto Art Gallery</a></span>
    <span class="divider">›</span>
    <span class="page-title">書籍閱讀器</span>
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-text" id="progress-label">載入中…</span>
    </div>
    <button id="theme-btn" aria-label="切換深色模式">🌙 深色</button>
    <button id="autoplay-btn" aria-label="自動播放" disabled>▶ 自動播放</button>
  </div>
</nav>

<!-- ── Hero header ─────────────────────────────────────────────── -->
<header id="hero">
  <h1 id="book-title">秋园 · 文字与画</h1>
  <p id="book-subtitle">每五分鐘從書中擷取一段新文字，配上 AI 生成的插圖。<br />向下捲動，閱讀目前的故事。</p>
  <span class="completed-badge" id="completed-badge" style="display:none">📖 全書完</span>
</header>

<!-- ── Loading state ───────────────────────────────────────────── -->
<div id="status">
  <div class="spinner"></div>
  <p>載入段落中…</p>
</div>

<!-- ── Entry feed ──────────────────────────────────────────────── -->
<main id="feed" style="display:none" aria-label="書中段落與插圖"></main>

<!-- ── Footer ─────────────────────────────────────────────────── -->
<footer>
  <p>
    插圖由 <a href="https://pollinations.ai" target="_blank" rel="noopener">Pollinations AI</a> 生成
    &nbsp;·&nbsp;
    <a href="../index.html">← 返回藝術圖庫</a>
    &nbsp;·&nbsp;
    每五分鐘自動更新
  </p>
</footer>

<!-- ── Lightbox ────────────────────────────────────────────────── -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="圖片檢視器">
  <img id="lightbox-img" src="" alt="" />
</div>

<!-- ── Auto-play overlay ─────────────────────────────────────── -->
<div id="autoplay-overlay" role="dialog" aria-modal="true" aria-label="自動播放">

  <!-- Top bar: close button + progress -->
  <div id="autoplay-top-bar">
    <button id="autoplay-close-btn" aria-label="關閉自動播放">✕ 關閉</button>
    <div id="autoplay-progress-wrap">
      <div id="autoplay-progress-bg">
        <div id="autoplay-progress-fill"></div>
      </div>
      <span id="autoplay-counter">0 / 0</span>
    </div>
  </div>

  <!-- Main content: image (left) + text (right) -->
  <div id="autoplay-content">

    <!-- Image panel -->
    <div id="autoplay-image-panel">
      <img id="autoplay-img" src="" alt="" />
      <!-- Countdown bar animates from 100% → 0% before each auto-advance -->
      <div id="autoplay-countdown-bar"></div>
    </div>

    <!-- Text panel -->
    <div id="autoplay-text-panel">
      <div id="autoplay-meta">
        <span id="autoplay-entry-num"></span>
        <span id="autoplay-entry-date"></span>
        <span id="autoplay-pause-badge">暫停中</span>
      </div>
      <p id="autoplay-passage"></p>
      <p id="autoplay-caption"></p>

      <!-- Timer adjuster -->
      <div id="autoplay-timer-row">
        <span>自動翻頁：</span>
        <button class="autoplay-adj-btn" id="autoplay-decrement" aria-label="減少秒數">－</button>
        <span id="autoplay-timer-value">8</span>
        <span>秒</span>
        <button class="autoplay-adj-btn" id="autoplay-increment" aria-label="增加秒數">＋</button>
      </div>

      <!-- Navigation controls -->
      <div id="autoplay-nav">
        <button class="autoplay-nav-btn" id="autoplay-prev" aria-label="上一段">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button class="autoplay-nav-btn" id="autoplay-playpause" aria-label="暫停">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="autoplay-nav-btn" id="autoplay-next" aria-label="下一段">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
        <button class="autoplay-nav-btn" id="autoplay-tts" aria-label="粵語朗讀" title="粵語朗讀">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
  /* ── Theme toggle ──────────────────────────────────────────────── */
  const themeBtn = document.getElementById('theme-btn');
  const root = document.documentElement;

  function applyTheme(dark) {
    root.dataset.theme = dark ? 'dark' : 'light';
    themeBtn.textContent = dark ? '☀️ 淺色' : '🌙 深色';
    localStorage.setItem('reader-theme', dark ? 'dark' : 'light');
  }

  // Initialize from stored preference or system preference
  const stored = localStorage.getItem('reader-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(stored ? stored === 'dark' : prefersDark);

  themeBtn.addEventListener('click', () => {
    applyTheme(root.dataset.theme !== 'dark');
  });

  /* ── Lightbox ──────────────────────────────────────────────────── */
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  function openLightbox(src, alt) {
    lightboxImg.src = src;
    lightboxImg.alt = alt || '';
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  lightbox.addEventListener('click', () => {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  });

  document.addEventListener('keydown', (e) => {
    // Auto-play overlay shortcuts take priority
    if (autoplayOverlay.classList.contains('open')) {
      if (e.key === 'Escape') { stopAutoPlayTts(); closeAutoPlay(); return; }
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        stopAutoPlayTts();
        stopAutoPlayTimer();
        showAutoPlayEntry(autoplayCurrent + 1);
        if (!autoplayPaused) startAutoPlayTimer();
        return;
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        stopAutoPlayTts();
        stopAutoPlayTimer();
        showAutoPlayEntry(autoplayCurrent - 1);
        if (!autoplayPaused) startAutoPlayTimer();
        return;
      }
      if (e.key === ' ') { e.preventDefault(); toggleAutoPlayPause(); return; }
      return;
    }
    if (e.key === 'Escape') {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
  });

  /* ── Helpers ───────────────────────────────────────────────────── */
  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleString('zh-TW', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    } catch (_) { return iso; }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Render ────────────────────────────────────────────────────── */
  function renderEntries(data) {
    const feed = document.getElementById('feed');
    const status = document.getElementById('status');
    const progressFill = document.getElementById('progress-fill');
    const progressLabel = document.getElementById('progress-label');
    const completedBadge = document.getElementById('completed-badge');

    const entries = data.entries || [];
    const total = data.book_total_chars || 0;
    const completed = data.completed || false;

    // Progress bar
    if (total > 0 && entries.length > 0) {
      const lastOffset = entries[entries.length - 1].offset_end || 0;
      const pct = Math.min(100, Math.round((lastOffset / total) * 100));
      progressFill.style.width = pct + '%';
      progressLabel.textContent = `${pct}% · ${entries.length} 段`;
    } else {
      progressFill.style.width = '0%';
      progressLabel.textContent = '尚無段落';
    }

    // Completed badge
    if (completed) {
      completedBadge.style.display = 'inline-block';
    }

    if (entries.length === 0) {
      status.innerHTML = '<p>尚未生成任何段落。<br>請稍後再查看！</p>';
      return;
    }

    status.style.display = 'none';
    feed.style.display = 'flex';

    // Update auto-play data
    autoplayEntries = entries;
    if (entries.length > 0) {
      document.getElementById('autoplay-btn').disabled = false;
    }

    feed.innerHTML = '';

    entries.forEach((entry, idx) => {
      const num = idx + 1;
      const article = document.createElement('article');
      article.className = 'entry';
      article.id = `entry-${num}`;

      const textSide = `
        <div class="entry-text">
          <div class="entry-meta">
            <span class="entry-num">第 ${num} 段</span>
            <span class="entry-date">${formatDate(entry.created_at)}</span>
          </div>
          <p class="entry-passage">${escapeHtml(entry.text).replace(/\n/g, '<br />')}</p>
          <p class="entry-caption">
            🎨 ${escapeHtml(entry.prompt || '')}
          </p>
        </div>`;

      const imgSrc = escapeHtml(entry.image || '');
      const imgAlt = `第 ${num} 段插圖`;
      const imageSide = `
        <div class="entry-image">
          <img src="${imgSrc}" alt="${imgAlt}" loading="lazy"
               data-src="${imgSrc}" data-alt="${imgAlt}" />
        </div>`;

      article.innerHTML = textSide + imageSide;

      // "Play from here" button
      const playFromBtn = document.createElement('button');
      playFromBtn.className = 'entry-play-from-btn';
      playFromBtn.title = `從第 ${num} 段開始自動播放`;
      playFromBtn.setAttribute('aria-label', `從第 ${num} 段開始自動播放`);
      playFromBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>從此處播放';
      playFromBtn.addEventListener('click', () => openAutoPlay(idx));
      article.querySelector('.entry-text').appendChild(playFromBtn);

      // Lightbox on image click
      const img = article.querySelector('.entry-image img');
      img.addEventListener('click', () => openLightbox(entry.image, imgAlt));

      feed.appendChild(article);
    });
  }

  /* ── Auto-play feature ─────────────────────────────────────────── */
  let autoplayEntries = [];
  let autoplayCurrent = 0;
  let autoplaySeconds = 8;
  let autoplayTimer = null;
  let autoplayPaused = false;
  let autoplayCountdownStart = null;

  const autoplayOverlay   = document.getElementById('autoplay-overlay');
  const autoplayBtn       = document.getElementById('autoplay-btn');
  const autoplayCloseBtn  = document.getElementById('autoplay-close-btn');
  const autoplayImg       = document.getElementById('autoplay-img');
  const autoplayEntryNum  = document.getElementById('autoplay-entry-num');
  const autoplayEntryDate = document.getElementById('autoplay-entry-date');
  const autoplayPassage   = document.getElementById('autoplay-passage');
  const autoplayCaptionEl = document.getElementById('autoplay-caption');
  const autoplayPFill     = document.getElementById('autoplay-progress-fill');
  const autoplayCounter   = document.getElementById('autoplay-counter');
  const autoplayTimerVal  = document.getElementById('autoplay-timer-value');
  const autoplayDecrBtn   = document.getElementById('autoplay-decrement');
  const autoplayIncrBtn   = document.getElementById('autoplay-increment');
  const autoplayPrevBtn   = document.getElementById('autoplay-prev');
  const autoplayPlayBtn   = document.getElementById('autoplay-playpause');
  const autoplayNextBtn   = document.getElementById('autoplay-next');
  const autoplayCdBar     = document.getElementById('autoplay-countdown-bar');
  const autoplayPauseBadge = document.getElementById('autoplay-pause-badge');

  function openAutoPlay(startIndex) {
    if (!autoplayEntries.length) return;
    autoplayCurrent = (typeof startIndex === 'number' && startIndex >= 0) ? startIndex : 0;
    autoplayPaused = false;
    updateAutoPlayPauseBtn();
    autoplayOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    showAutoPlayEntry(autoplayCurrent);
    startAutoPlayTimer();
  }

  function closeAutoPlay() {
    stopAutoPlayTimer();
    autoplayOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showAutoPlayEntry(index) {
    if (index < 0 || index >= autoplayEntries.length) return;
    autoplayCurrent = index;
    const entry = autoplayEntries[index];
    const num   = index + 1;
    const total = autoplayEntries.length;

    // Progress
    autoplayPFill.style.width = Math.round((num / total) * 100) + '%';
    autoplayCounter.textContent = `${num} / ${total}`;

    // Nav button states
    autoplayPrevBtn.disabled = (index === 0);
    autoplayNextBtn.disabled = (index === total - 1);

    // Fade out then swap content
    autoplayPassage.style.opacity = '0';
    autoplayImg.style.opacity     = '0';

    setTimeout(() => {
      autoplayEntryNum.textContent  = `第 ${num} 段`;
      autoplayEntryDate.textContent = formatDate(entry.created_at);
      autoplayPassage.textContent   = entry.text;
      // Prompt is not shown in autoplay mode
      autoplayCaptionEl.textContent = '';

      const imgSrc = entry.image || '';
      autoplayImg.alt    = `第 ${num} 段插圖`;
      autoplayImg.onload  = () => { autoplayImg.style.opacity = '1'; };
      autoplayImg.onerror = () => { autoplayImg.style.opacity = '0.2'; };
      autoplayImg.src    = imgSrc;
      if (autoplayImg.complete && autoplayImg.naturalWidth) {
        autoplayImg.style.opacity = '1';
      }
      autoplayPassage.style.opacity = '1';
      // Speak entry text if TTS is active
      if (autoplayTtsEnabled) speakAutoPlayEntry(entry.text);
    }, 350);
  }

  function startAutoPlayTimer() {
    stopAutoPlayTimer();
    if (autoplayPaused || !autoplayEntries.length) return;

    autoplayCountdownStart = Date.now();

    // Animate countdown bar: 100% → 0% over autoplaySeconds seconds
    autoplayCdBar.style.transition = 'none';
    autoplayCdBar.style.width      = '100%';
    void autoplayCdBar.offsetWidth; // force reflow
    autoplayCdBar.style.transition = `width ${autoplaySeconds}s linear`;
    autoplayCdBar.style.width      = '0%';

    autoplayTimer = setTimeout(() => {
      autoplayCountdownStart = null;
      if (autoplayCurrent < autoplayEntries.length - 1) {
        showAutoPlayEntry(autoplayCurrent + 1);
        startAutoPlayTimer();
      } else {
        // Reached the last entry – pause playback
        autoplayPaused = true;
        updateAutoPlayPauseBtn();
      }
    }, autoplaySeconds * 1000);
  }

  function stopAutoPlayTimer() {
    if (autoplayTimer) {
      clearTimeout(autoplayTimer);
      autoplayTimer = null;
    }
    // Freeze countdown bar at its current visual position
    if (autoplayCountdownStart !== null) {
      const elapsed   = Date.now() - autoplayCountdownStart;
      const remaining = Math.max(0, autoplaySeconds * 1000 - elapsed);
      const pct       = (remaining / (autoplaySeconds * 1000)) * 100;
      autoplayCdBar.style.transition = 'none';
      autoplayCdBar.style.width      = pct + '%';
      autoplayCountdownStart = null;
    }
  }

  function toggleAutoPlayPause() {
    autoplayPaused = !autoplayPaused;
    updateAutoPlayPauseBtn();
    if (autoplayPaused) {
      stopAutoPlayTimer();
      stopAutoPlayTts();
    } else {
      startAutoPlayTimer();
    }
  }

  const SVG_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
  const SVG_PLAY  = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';

  function updateAutoPlayPauseBtn() {
    if (autoplayPaused) {
      autoplayPlayBtn.innerHTML = SVG_PLAY;
      autoplayPlayBtn.setAttribute('aria-label', '播放');
      autoplayPauseBadge.classList.add('visible');
    } else {
      autoplayPlayBtn.innerHTML = SVG_PAUSE;
      autoplayPlayBtn.setAttribute('aria-label', '暫停');
      autoplayPauseBadge.classList.remove('visible');
    }
  }

  /* ── Cantonese TTS ─────────────────────────────────────────────── */
  let autoplayTtsEnabled = false;
  let autoplayTtsVoices  = [];
  const autoplayTtsBtn   = document.getElementById('autoplay-tts');

  if ('speechSynthesis' in window) {
    const loadVoices = () => { autoplayTtsVoices = window.speechSynthesis.getVoices(); };
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }

  function speakAutoPlayEntry(text) {
    if (!('speechSynthesis' in window) || !text) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    // Cantonese voice selection
    const candidates = [
      { name: 'Sin-Ji',          lang: 'zh-HK', score: 12 },
      { name: 'Microsoft Tracy', lang: 'zh-HK', score: 11 },
      { name: 'Tracy',           lang: 'zh-HK', score: 10 },
      { name: 'Microsoft Danny', lang: 'zh-HK', score:  9 },
      { contains: 'Cantonese',   lang: 'zh',    score:  8 },
      { contains: 'Hong Kong',   lang: 'zh',    score:  7 },
      { lang: 'zh-HK',                          score:  6 }
    ];
    let selected = null, best = 0;
    const voices = autoplayTtsVoices.length ? autoplayTtsVoices : window.speechSynthesis.getVoices();
    candidates.forEach(c => {
      voices.forEach(v => {
        let s = 0;
        if (c.name    && v.name.includes(c.name))    s = c.score;
        else if (c.contains && v.name.includes(c.contains)) s = c.score - 1;
        if (c.lang && v.lang.includes(c.lang))       s += 1;
        if (s > best) { best = s; selected = v; }
      });
    });
    if (!selected) selected = voices.find(v => v.lang.includes('zh-HK'));
    if (!selected) selected = voices.find(v => v.lang.includes('zh'));
    if (selected)  utterance.voice = selected;
    utterance.lang   = 'zh-HK';
    utterance.rate   = 0.9;  // slightly slower for tonal clarity
    utterance.pitch  = 1.15; // slightly higher for expressive Cantonese tones
    utterance.volume = 1.0;
    window.speechSynthesis.speak(utterance);
  }

  function stopAutoPlayTts() {
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  }

  autoplayTtsBtn.addEventListener('click', () => {
    autoplayTtsEnabled = !autoplayTtsEnabled;
    autoplayTtsBtn.classList.toggle('active', autoplayTtsEnabled);
    autoplayTtsBtn.setAttribute('aria-label', autoplayTtsEnabled ? '關閉朗讀' : '粵語朗讀');
    if (!autoplayTtsEnabled) stopAutoPlayTts();
  });

  // Button bindings
  autoplayBtn.addEventListener('click', openAutoPlay);
  autoplayCloseBtn.addEventListener('click', () => { stopAutoPlayTts(); closeAutoPlay(); });

  autoplayPrevBtn.addEventListener('click', () => {
    stopAutoPlayTts();
    stopAutoPlayTimer();
    showAutoPlayEntry(autoplayCurrent - 1);
    if (!autoplayPaused) startAutoPlayTimer();
  });

  autoplayNextBtn.addEventListener('click', () => {
    stopAutoPlayTts();
    stopAutoPlayTimer();
    showAutoPlayEntry(autoplayCurrent + 1);
    if (!autoplayPaused) startAutoPlayTimer();
  });

  autoplayPlayBtn.addEventListener('click', toggleAutoPlayPause);

  autoplayDecrBtn.addEventListener('click', () => {
    if (autoplaySeconds > 3) {
      autoplaySeconds--;
      autoplayTimerVal.textContent = autoplaySeconds;
      if (!autoplayPaused) { stopAutoPlayTimer(); startAutoPlayTimer(); }
    }
  });

  autoplayIncrBtn.addEventListener('click', () => {
    if (autoplaySeconds < 60) {
      autoplaySeconds++;
      autoplayTimerVal.textContent = autoplaySeconds;
      if (!autoplayPaused) { stopAutoPlayTimer(); startAutoPlayTimer(); }
    }
  });

  /* ── Fetch data ────────────────────────────────────────────────── */
  async function loadData() {
    try {
      const res = await fetch('reader_entries.json?_=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderEntries(data);
    } catch (err) {
      document.getElementById('status').innerHTML =
        `<p>無法載入段落。<br><small>${err.message}</small></p>`;
    }
  }

  loadData();

  // Auto-refresh every 5 minutes so readers see new content without reloading
  setInterval(loadData, 5 * 60 * 1000);
</script>

</body>
</html>
