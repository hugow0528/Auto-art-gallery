name: Book Reader Generator

on:
  schedule:
    - cron: '0 20 * * *'    #  4:00 AM HKT
    - cron: '0 21 * * *'    #  5:00 AM HKT
    - cron: '0 22 * * *'    #  6:00 AM HKT
    - cron: '0 23 * * *'    #  7:00 AM HKT
    - cron: '0 0 * * *'     #  8:00 AM HKT
    - cron: '0 1 * * *'     #  9:00 AM HKT
    - cron: '0 2 * * *'     # 10:00 AM HKT
    - cron: '0 3 * * *'     # 11:00 AM HKT
    - cron: '0 4 * * *'     # 12:00 PM HKT
    - cron: '0 5 * * *'     #  1:00 PM HKT
    - cron: '0 6 * * *'     #  2:00 PM HKT
    - cron: '0 7 * * *'     #  3:00 PM HKT
    - cron: '0 8 * * *'     #  4:00 PM HKT
    - cron: '0 9 * * *'     #  5:00 PM HKT
    - cron: '0 10 * * *'    #  6:00 PM HKT
    - cron: '0 11 * * *'    #  7:00 PM HKT
    - cron: '0 12 * * *'    #  8:00 PM HKT
    - cron: '0 13 * * *'    #  9:00 PM HKT
    - cron: '0 14 * * *'    # 10:00 PM HKT
    - cron: '0 15 * * *'    # 11:00 PM HKT
  workflow_dispatch:         # Allow manual trigger

permissions:
  contents: write

# Prevent concurrent runs to avoid git conflicts on reader_entries.json
concurrency:
  group: generate-reader
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Generate reader segment
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: python generate_reader.py

      - name: Commit and push new segment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add book/reader_images/ book/reader_entries.json book/reader_progress.json
          git diff --staged --quiet || git commit -m "feat: add reader segment $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M %Z')"
          # Retry push up to 3 times to handle any transient remote divergence
          pushed=false
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "${GITHUB_REF_NAME}" && { pushed=true; break; } || {
              echo "Push attempt ${attempt} failed, retrying in 10s…"
              sleep 10
            }
          done
          if [ "${pushed}" != "true" ]; then
            echo "ERROR: All push attempts failed."
            exit 1
          fi
