name: Generate Artwork

on:
  schedule:
    - cron: '0,30 20-23 * * *'  # 4:00 AM – 7:30 AM HKT (UTC+8)
    - cron: '0,30 0-14 * * *'   # 8:00 AM – 10:30 PM HKT (UTC+8)
    - cron: '0 15 * * *'        # 11:00 PM HKT (UTC+8)
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Generate artwork
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: python generate_artwork.py

      - name: Commit and push new artwork
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ gallery.json
          git diff --staged --quiet || git commit -m "feat: add artwork $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M %Z')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "${GITHUB_REF_NAME}"
